name: Publish NuGet packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_XML_DOC_MODE: skip

jobs:
  build-test-pack:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore RailReaderCore.slnx

      - name: Build
        run: dotnet build RailReaderCore.slnx -c Release -p:ContinuousIntegrationBuild=true --no-restore

      - name: Test
        run: dotnet test tests/RailReader.Core.Tests -c Release --no-build --logger "console;verbosity=detailed"

      - name: Pack
        run: dotnet pack RailReaderCore.slnx -c Release -p:ContinuousIntegrationBuild=true --no-build -o dist/

      - name: NuGet login
        if: startsWith(github.ref, 'refs/tags/v')
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: sjvrensburg

      - name: Publish to NuGet.org
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet nuget push dist/*.nupkg --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Upload packages
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: dist/*.nupkg
